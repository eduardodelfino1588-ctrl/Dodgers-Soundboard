<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dodgers Smart Soundboard</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #005a9c; color: white; text-align: center; padding: 20px; margin: 0; }
        .grid-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 20px; max-width: 1200px; margin: 0 auto; padding: 20px; }
        .player-card { background: #003366; padding: 20px; border-radius: 12px; box-shadow: 0 4px 8px rgba(0,0,0,0.3); border: 2px solid #ffffff33; text-align: center; }
        .player-name { font-size: 1.3em; font-weight: bold; margin-bottom: 12px; }
        button { color: white; border: none; padding: 12px 20px; margin: 5px 0; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; font-size: 1em; }
        .play-btn { background-color: #ef3e42; }
        .play-btn:hover { background-color: #cc292e; }
        .record-btn { background-color: #4CAF50; }
        .record-btn:hover { background-color: #43a047; }
        .recording { background-color: #ff5722 !important; }
        .status-msg { font-size: 0.85em; color: #ffeb3b; display: block; margin-top: 4px; font-weight: bold; min-height: 18px; }
        .controls-bar { position: sticky; bottom: 0; background-color: #002244; padding: 15px; margin-top: 40px; }
        .stop-btn { background-color: #222; border: 2px solid white; border-radius: 30px; width: auto; padding: 12px 40px; font-size: 1.2em; }
    </style>
</head>
<body>
    <h1>⚾ Dodgers Walk-Up Soundboard ⚾</h1>
    <div class="grid-container" id="roster-grid"></div>
    <div class="controls-bar">
        <button class="stop-btn" onclick="stopAll()">🛑 STOP MUSIC</button>
    </div>
    <script>
        const players = [
            { name: "Christian Agius", file: "The Hey Song-[AudioTrimmer.com].mp3" },
            { name: "Antonio Delfino", file: "DMX - X Gon' Give It To Ya-[AudioTrimmer.com].mp3" },
            { name: "Brayden Findlay", file: "Wiz Khalifa - Black And Yellow [Official Music Video]-[AudioTrimmer.com].mp3" },
            { name: "Cruz Gouveia", file: "Zedd - Beautiful Now ft. Jon Bellion (Official Audio)-[AudioTrimmer.com].mp3" },
            { name: "Wes Hajsan", file: "Kevin Rudolf - Let It Rock - Ft. Lil' Wayne (HQ)(Explicit)-[AudioTrimmer.com].mp3" },
            { name: "Easton Healey", file: "Ok Blue Jays Song - Music Video-[AudioTrimmer.com].mp3" },
            { name: "Carter Minamata", file: "Yin Yang (Pop Remix) - USSofficial (128k)-[AudioTrimmer.com].mp3" },
            { name: "Isla Neller", file: "Grabbitz- My Cloud-[AudioTrimmer.com].mp3" },
            { name: "Conor Rouse", file: "illScarlett - Clearer Now (Official Audio) - illscarlettVEVO (128k).mp3" },
            { name: "Patrick Rouse", file: "[Hardcore] - Stonebank - Stronger (feat. EMEL) [Monstercat Release] - Monstercat Uncaged (128k)-[AudioTrimmer.com].mp3" },
            { name: "Mila Royiwsky", file: "Denzel Curry, Gizzle, Bren Joy - Dynasties & Dystopia _ Arcane League of Legends _ Riot Games Music-[AudioTrimmer.com].mp3" },
            { name: "Ronan Royiwsky", file: "Yin Yang (Pop Remix) - USSofficial (128k)-(1).mp3" },
            { name: "Benjamin Sam", file: "Grabbitz- My Cloud-[AudioTrimmer.com] (1).mp3" }
        ];
        const audioStorage = {};
        const grid = document.getElementById('roster-grid');
        players.forEach((player, index) => {
            const card = document.createElement('div');
            card.className = 'player-card';
            card.innerHTML = `<div class="player-name">${player.name}</div><button class="play-btn" onclick="playAudio('${player.file}')">🎵 Play</button>`;
            grid.appendChild(card);
        });
        function playAudio(file) {
            stopAll();
            new Audio(file).play();
        }
        function stopAll() {
            location.reload();
        }
    </script>
</body>
</html>
