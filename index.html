<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dodgers Smart Soundboard</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #005a9c; color: white; text-align: center; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; max-width: 1200px; margin: 0 auto; padding: 20px; }
        .card { background: #003366; padding: 20px; border-radius: 12px; box-shadow: 0 4px 8px rgba(0,0,0,0.3); border: 2px solid #ffffff33; text-align: center; }
        h3 { margin-top: 0; font-size: 1.3em; color: #fff; margin-bottom: 10px; }
        button { background-color: #ef3e42; color: white; border: none; padding: 10px 15px; margin: 5px 0; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; font-size: 1em; }
        button:hover { background-color: #cc292e; }
        .file-label { background-color: #444; display: block; padding: 8px; margin: 5px 0; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 0.9em; }
        .file-label:hover { background-color: #555; }
        .file-input { display: none; }
        .record-btn { background-color: #4CAF50; }
        .record-btn:hover { background-color: #43a047; }
        .recording { background-color: #ff5722 !important; }
        .stop-btn { background-color: #333; margin-top: 30px; padding: 15px 40px; font-size: 1.3em; width: auto; border: 2px solid white; }
        .status { font-size: 0.85em; color: #4CAF50; display: block; margin-top: 4px; font-weight: bold; }
    </style>
</head>
<body>

    <h1>⚾ Dodgers Walk-Up Soundboard ⚾</h1>
    <p>Link your music tracks and record your voice intros below!</p>

    <div class="grid" id="roster"></div>

    <button class="stop-btn" onclick="stopAll()">🛑 STOP MUSIC</button>

    <script>
        const players = [
            "Christian Agius", "Antonio Delfino", "Brayden Findlay", "Cruz Gouveia", 
            "Wes Hajsan", "Easton Healey", "Carter Minamata", "Isla Neller", 
            "Conor Rouse", "Patrick Rouse", "Mila Royiwsky", "Ronan Royiwsky", "Benjamin Sam"
        ];

        let audioStorage = {};
        let currentVoice = null;
        let currentMusic = null;
        let mediaRecorder = null;
        let audioChunks = [];

        const rosterGrid = document.getElementById('roster');

        players.forEach((name, index) => {
            audioStorage[index] = { voice: null, music: null };
            
            // Load saved voice from storage if it exists
            const savedVoice = localStorage.getItem('voice-' + index);
            if (savedVoice) { audioStorage[index].voice = savedVoice; }

            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <h3>${name}</h3>
                <button onclick="playPlayer(${index})">🎵 Play Intro</button>
                <button class="record-btn" id="rec-${index}" onclick="toggleRecord(${index})">🎙️ Record Voice</button>
                <span class="status" id="v-status-${index}">${savedVoice ? '✅ Voice Saved' : ''}</span>
                
                <label class="file-label" for="file-${index}">📁 Choose Music File</label>
                <input type="file" id="file-${index}" class="file-input" accept="audio/*" onchange="handleMusic(${index}, event)">
                <span class="status" id="m-status-${index}"></span>
            `;
            rosterGrid.appendChild(card);
        });

        function handleMusic(index, event) {
            const file = event.target.files[0];
            if (file) {
                audioStorage[index].music = URL.createObjectURL(file);
                document.getElementById(`m-status-${index}`).innerText = "✅ Music Loaded";
            }
        }

        function toggleRecord(index) {
            const btn = document.getElementById('rec-' + index);
            const status = document.getElementById('v-status-' + index);

            if (mediaRecorder && mediaRecorder.state === "recording") {
                mediaRecorder.stop();
                btn.innerText = "🎙️ Record Voice";
                btn.classList.remove('recording');
                return;
            }

            navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];
                mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
                
                mediaRecorder.onstop = () => {
                    const blob = new Blob(audioChunks, { type: 'audio/mp3' });
                    const reader = new FileReader();
                    reader.readAsDataURL(blob);
                    reader.onloadend = function() {
                        const base64data = reader.result;
                        audioStorage[index].voice = base64data;
                        localStorage.setItem('voice-' + index, base64data);
                        status.innerText = "✅ Voice Saved";
                    }
                };

                mediaRecorder.start();
                btn.innerText = "🛑 Recording...";
                btn.classList.add('recording');
            }).catch(err => alert("Microphone permissions required."));
        }

        function playPlayer(index) {
            stopAll();
            const player = audioStorage[index];
            
            if (player.voice) {
                currentVoice = new Audio(player.voice);
                currentVoice.play();
                currentVoice.onended = function() {
                    if (player.music) { currentMusic = new Audio(player.music); currentMusic.play(); }
                };
            } else if (player.music) {
                currentMusic = new Audio(player.music);
                currentMusic.play();
            }
        }

        function stopAll() {
            if (currentVoice) { currentVoice.pause(); currentVoice.currentTime = 0; }
            if (currentMusic) { currentMusic.pause(); currentMusic.currentTime = 0; }
        }
    </script>
</body>
</html>
