<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dodgers Smart Soundboard</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #005a9c; color: white; text-align: center; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; max-width: 1200px; margin: 0 auto; padding: 20px; }
        .card { background: #003366; padding: 20px; border-radius: 12px; box-shadow: 0 4px 8px rgba(0,0,0,0.3); border: 2px solid #ffffff33; }
        h3 { margin-top: 0; font-size: 1.3em; color: #fff; }
        button { background-color: #ef3e42; color: white; border: none; padding: 12px 20px; margin: 8px 0; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; font-size: 1em; }
        button:hover { background-color: #cc292e; }
        .stop-btn { background-color: #333; margin-top: 30px; padding: 15px 40px; font-size: 1.3em; width: auto; border: 2px solid white; }
    </style>
</head>
<body>

    <h1>⚾ Dodgers Walk-Up Soundboard ⚾</h1>
    <p>Music tracks are permanently linked!</p>

    <div class="grid">
        <div class="card"><h3>Christian Agius</h3><button onclick="playSong('The Hey Song-[AudioTrimmer.com].mp3')">🎵 Play Intro</button></div>
        <div class="card"><h3>Antonio Delfino</h3><button onclick="playSong('DMX - X Gon\' Give It To Ya-[AudioTrimmer.com].mp3')">🎵 Play Intro</button></div>
        <div class="card"><h3>Brayden Findlay</h3><button onclick="playSong('Wiz Khalifa - Black And Yellow [Official Music Video]-[AudioTrimmer.com].mp3')">🎵 Play Intro</button></div>
        <div class="card"><h3>Cruz Gouveia</h3><button onclick="playSong('Zedd - Beautiful Now ft. Jon Bellion (Official Audio)-[AudioTrimmer.com].mp3')">🎵 Play Intro</button></div>
        <div class="card"><h3>Wes Hajsan</h3><button onclick="playSong('Kevin Rudolf - Let It Rock - Ft. Lil\' Wayne (HQ)(Explicit)-[AudioTrimmer.com].mp3')">🎵 Play Intro</button></div>
        <div class="card"><h3>Easton Healey</h3><button onclick="playSong('Ok Blue Jays Song - Music Video-[AudioTrimmer.com].mp3')">🎵 Play Intro</button></div>
        <div class="card"><h3>Carter Minamata</h3><button onclick="playSong('Yin Yang (Pop Remix) - USSofficial (128k).mp3')">🎵 Play Intro</button></div>
        <div class="card"><h3>Isla Neller</h3><button onclick="playSong('Grabbitz- My Cloud-[AudioTrimmer.com].mp3')">🎵 Play Intro</button></div>
        <div class="card"><h3>Conor Rouse</h3><button onclick="playSong('illScarlett - Clearer Now (Official Audio) - illscarlettVEVO (128k).mp3')">🎵 Play Intro</button></div>
        <div class="card"><h3>Patrick Rouse</h3><button onclick="playSong('%5BHardcore%5D - Stonebank - Stronger (feat. EMEL) %5BMonstercat Release%5D - Monstercat Uncaged (128k)-[AudioTrimmer.com].mp3')">🎵 Play Intro</button></div>
        <div class="card"><h3>Mila Royiwsky</h3><button onclick="playSong('Denzel Curry, Gizzle, Bren Joy - Dynasties %26 Dystopia _ Arcane League of Legends _ Riot Games Music-[AudioTrimmer.com].mp3')">🎵 Play Intro</button></div>
        <div class="card"><h3>Ronan Royiwsky</h3><button onclick="playSong('Yin Yang (Pop Remix) - USSofficial (128k)-(1).mp3')">🎵 Play Intro</button></div>
        <div class="card"><h3>Benjamin Sam</h3><button onclick="playSong('Grabbitz- My Cloud-[AudioTrimmer.com] (1).mp3')">🎵 Play Intro</button></div>
    </div>

    <button class="stop-btn" onclick="stopAll()">🛑 STOP MUSIC</button>

    <script>
        let currentAudio = null;
        function playSong(fileName) {
            if (currentAudio) { currentAudio.pause(); }
            currentAudio = new Audio(fileName);
            currentAudio.play().catch(e => console.log("Playback error: ", e));
        }
        function stopAll() {
            if (currentAudio) { currentAudio.pause(); currentAudio.currentTime = 0; }
        }
    </script>
</body>
</html>
