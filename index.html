<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dodgers Smart Soundboard</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #005a9c; color: white; text-align: center; padding: 20px; margin: 0; }
        .grid-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 20px; max-width: 1200px; margin: 0 auto; padding: 20px; }
        .player-card { background: #003366; padding: 20px; border-radius: 12px; box-shadow: 0 4px 8px rgba(0,0,0,0.3); border: 2px solid #ffffff33; text-align: center; }
        .player-name { font-size: 1.3em; font-weight: bold; margin-bottom: 12px; }
        button { color: white; border: none; padding: 12px 20px; margin: 5px 0; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; font-size: 1em; }
        .play-btn { background-color: #ef3e42; }
        .play-btn:hover { background-color: #cc292e; }
        .record-btn { background-color: #4CAF50; }
        .record-btn:hover { background-color: #43a047; }
        .recording { background-color: #ff5722 !important; }
        .file-label { background-color: #444; display: block; padding: 10px; margin: 5px 0; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 0.9em; text-align: center; }
        .file-label:hover { background-color: #555; }
        .file-input { display: none; }
        .status-msg { font-size: 0.85em; color: #ffeb3b; display: block; margin-top: 4px; font-weight: bold; min-height: 18px; }
        .controls-bar { position: sticky; bottom: 0; background-color: #002244; padding: 15px; margin-top: 40px; }
        .stop-btn { background-color: #222; border: 2px solid white; border-radius: 30px; width: auto; padding: 12px 40px; font-size: 1.2em; }
    </style>
</head>
<body>

    <h1>⚾ Dodgers Walk-Up Soundboard ⚾</h1>
    <p>Setup your audio options directly on this device!</p>

    <div class="grid-container" id="roster-grid"></div>

    <div class="controls-bar">
        <button class="stop-btn" onclick="stopAll()">🛑 STOP MUSIC</button>
    </div>

    <script>
        const players = [
            "Christian Agius", "Antonio Delfino", "Brayden Findlay", "Cruz Gouveia", 
            "Wes Hajsan", "Easton Healey", "Carter Minamata", "Isla Neller", 
            "Conor Rouse", "Patrick Rouse", "Mila Royiwsky", "Ronan Royiwsky", "Benjamin Sam"
        ];

        const audioStorage = {};
        let currentVoiceAudio = null;
        let currentMusicAudio = null;
        let mediaRecorder = null;
        let audioChunks = [];

        const grid = document.getElementById('roster-grid');

        players.forEach((name, index) => {
            audioStorage[index] = { voice: null, music: null };
            
            // Load previously recorded voice if available
            const savedVoice = localStorage.getItem('voice-' + index);
            if (savedVoice) { audioStorage[index].voice = savedVoice; }

            const card = document.createElement('div');
            card.className = 'player-card';
            card.innerHTML = `
                <div class="player-name">${name}</div>
                <button class="play-btn" onclick="playPlayer(${index})">🎵 Play Intro</button>
                
                <div style="margin-top: 15px; border-top: 1px solid #ffffff22; padding-top: 10px;">
                    <button class="record-btn" id="rec-${index}" onclick="toggleRecord(${index})">🎙️ Record Voice</button>
                    <span id="v-status-${index}" class="status-msg">${savedVoice ? '✅ Voice Saved' : ''}</span>
                    
                    <label class="file-label" for="file-${index}">📁 Choose Music File</label>
                    <input type="file" id="file-${index}" class="file-input" accept="audio/*" onchange="handleMusicUpload(event, ${index})">
                    <span id="m-status-${index}" class="status-msg"></span>
                </div>
            `;
            grid.appendChild(card);
        });

        function handleMusicUpload(event, index) {
            const file = event.target.files[0];
            if (file) {
                audioStorage[index].music = URL.createObjectURL(file);
                document.getElementById(`m-status-${index}`).innerText = "✅ Music Loaded";
            }
        }

        function toggleRecord(index) {
            const btn = document.getElementById(`rec-${index}`);
            const status = document.getElementById(`v-status-${index}`);

            if (mediaRecorder && mediaRecorder.state === "recording") {
                mediaRecorder.stop();
                btn.innerText = "🎙️ Record Voice";
                btn.classList.remove('recording');
                return;
            }

            navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];
                mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
                
                mediaRecorder.onstop = () => {
                    const blob = new Blob(audioChunks, { type: 'audio/mp3' });
                    const reader = new FileReader();
                    reader.readAsDataURL(blob);
                    reader.onloadend = function() {
                        const base64data = reader.result;
                        audioStorage[index].voice = base64data;
                        localStorage.setItem('voice-' + index, base64data);
                        status.innerText = "✅ Voice Saved";
                    }
                };

                mediaRecorder.start();
                btn.innerText = "🛑 Recording...";
                btn.classList.add('recording');
            }).catch(err => alert("Please allow microphone permissions to record intros."));
        }

        function playPlayer(index) {
            stopAll();
            const data = audioStorage[index];
            
            if (data.voice) {
                currentVoiceAudio = new Audio(data.voice);
                currentVoiceAudio.play();
                currentVoiceAudio.onended = function() {
                    if (data.music) { currentMusicAudio = new Audio(data.music); currentMusicAudio.play(); }
                };
            } else if (data.music) {
                currentMusicAudio = new Audio(data.music);
                currentMusicAudio.play();
            }
        }

        function stopAll() {
            if (currentVoiceAudio) { currentVoiceAudio.pause(); currentVoiceAudio.currentTime = 0; }
            if (currentMusicAudio) { currentMusicAudio.pause(); currentMusicAudio.currentTime = 0; }
        }
    </script>
</body>
</html>
